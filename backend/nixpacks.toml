# Railway / Nixpacks: set the service root directory to `backend/`.
# Requires DJANGO_SECRET_KEY and ALLOWED_HOSTS at build time for collectstatic.

[phases.build]
cmds = ['pip install -r requirements.txt', 'python manage.py collectstatic --noinput']

[start]
cmd = 'gunicorn leveld.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4'
