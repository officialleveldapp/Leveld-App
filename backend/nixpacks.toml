# Railway / Nixpacks: set the service root directory to `backend/`.
# collectstatic runs in [start] (not build) so the image build needs no Django env vars.

[phases.build]
cmds = ['pip install -r requirements.txt']

[start]
# Run migrations + collect static (admin + /panel assets) on every boot, then serve.
cmd = 'python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn leveld.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4'
